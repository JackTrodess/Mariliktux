<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { SMAAPass } from 'three/addons/postprocessing/SMAAPass.js';

// ═══════════════════════════════════════
// GLOBALS
// ═══════════════════════════════════════
let scene, camera, renderer, composer, clock;
let gameState = 'title';
let player, aiVehicles = [];
let trackWPs = []; // waypoints
let raceTimer = 0, debugVisible = false;
let audioCtx, engineOsc, engineGain;

const LAPS = 3, NUM_AI = 3;
const AI_COLORS = [0xff3344, 0x3388ff, 0xffcc22];
const TRACK_W = 14, TRACK_HW = 7;
const UP = new THREE.Vector3(0,1,0);

// Input
const keys = {};
let camAngleH = 0, camAngleV = 0.25;

// Title BG
const titleBg = document.getElementById('title-bg');
const bgImg = new Image(); bgImg.crossOrigin = 'anonymous'; bgImg.src = './assets/title-screen.png';
bgImg.onload = () => { titleBg.style.backgroundImage = `url(${bgImg.src})`; };

// ═══════════════════════════════════════
// VEHICLE CLASS (arcade physics - no Rapier)
// ═══════════════════════════════════════
class Vehicle {
  constructor(c1, c2, isPlayer, startIdx) {
    this.isPlayer = isPlayer;
    this.pos = new THREE.Vector3();
    this.vel = new THREE.Vector3();
    this.yaw = 0; // rotation around Y
    this.speed = 0;
    this.grounded = true;
    this.yVel = 0;
    this.mode = 'car'; this.targetMode = 'car'; this.modeT = 0;
    this.boost = 100; this.boostActive = false;
    this.lap = 1; this.nextCP = 0; this.cpPassed = new Set();
    this.finished = false; this.finishTime = 0;
    this.wpIdx = startIdx || 0; this.totalProgress = 0;
    this.aiTarget = ((startIdx||0) + 20) % (trackWPs.length || 1);
    this.aiBaseSpeed = 20 + Math.random() * 8;

    // Init pos from waypoint
    if (trackWPs.length > 0) {
      const wp = trackWPs[this.wpIdx % trackWPs.length];
      const nw = trackWPs[(this.wpIdx + 1) % trackWPs.length];
      this.pos.copy(wp).add(new THREE.Vector3(0, 1, 0));
      this.yaw = Math.atan2(nw.x - wp.x, nw.z - wp.z);
    }

    // Build mesh
    this.group = new THREE.Group();
    this.wheels = [];
    this.buildCar(c1, c2);
    this.buildFly(c1, c2);
    this.buildMech(c1, c2);
    scene.add(this.group);
    this.syncMesh();
  }

  buildCar(c1, c2) {
    this.carGrp = new THREE.Group();
    const bMat = new THREE.MeshStandardMaterial({color:c1,roughness:.3,metalness:.7});
    const body = new THREE.Mesh(new THREE.BoxGeometry(2.2,.55,3.8), bMat);
    body.position.y = .35; body.castShadow = true; this.carGrp.add(body);
    const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.7,.45,1.8), new THREE.MeshStandardMaterial({color:0x111122,roughness:.2,metalness:.8}));
    cabin.position.set(0,.82,-.2); this.carGrp.add(cabin);
    const sMat = new THREE.MeshStandardMaterial({color:c2,emissive:c2,emissiveIntensity:.4});
    const spoiler = new THREE.Mesh(new THREE.BoxGeometry(1.8,.08,.35), sMat);
    spoiler.position.set(0,1.05,-1.7); this.carGrp.add(spoiler);
    for(let s=-1;s<=1;s+=2){const sp=new THREE.Mesh(new THREE.BoxGeometry(.08,.35,.08),sMat);sp.position.set(s*.75,.85,-1.7);this.carGrp.add(sp);}
    const wG=new THREE.CylinderGeometry(.32,.32,.22,10),wM=new THREE.MeshStandardMaterial({color:0x222222,roughness:.8});
    [[-1.05,.12,1.2],[1.05,.12,1.2],[-1.05,.12,-1.2],[1.05,.12,-1.2]].forEach(([x,y,z])=>{
      const w=new THREE.Mesh(wG,wM);w.position.set(x,y,z);w.rotation.z=Math.PI/2;this.carGrp.add(w);this.wheels.push(w);
    });
    for(let s=-1;s<=1;s+=2){
      const hl=new THREE.Mesh(new THREE.SphereGeometry(.12,6,6),new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:2}));
      hl.position.set(s*.65,.45,1.9);this.carGrp.add(hl);
      const tl=new THREE.Mesh(new THREE.BoxGeometry(.25,.12,.04),new THREE.MeshStandardMaterial({color:0xff2222,emissive:0xff2222,emissiveIntensity:1.5}));
      tl.position.set(s*.65,.45,-1.9);this.carGrp.add(tl);
    }
    this.group.add(this.carGrp);
  }

  buildFly(c1, c2) {
    this.flyGrp = new THREE.Group(); this.flyGrp.visible = false;
    for(let s=-1;s<=1;s+=2){
      const wg=new THREE.Mesh(new THREE.BoxGeometry(2.8,.06,1.3),new THREE.MeshStandardMaterial({color:c2,emissive:c2,emissiveIntensity:.3,roughness:.2,metalness:.8}));
      wg.position.set(s*2.5,.45,-.4);this.flyGrp.add(wg);
      const eg=new THREE.Mesh(new THREE.CylinderGeometry(.25,.2,1,8),new THREE.MeshStandardMaterial({color:0x333344,roughness:.4,metalness:.8}));
      eg.rotation.x=Math.PI/2;eg.position.set(s*1.4,.3,-1.4);this.flyGrp.add(eg);
      const gl=new THREE.Mesh(new THREE.SphereGeometry(.18,6,6),new THREE.MeshStandardMaterial({color:0xff8c42,emissive:0xff8c42,emissiveIntensity:4}));
      gl.position.set(s*1.4,.3,-2);this.flyGrp.add(gl);
    }
    this.group.add(this.flyGrp);
  }

  buildMech(c1, c2) {
    this.mechGrp = new THREE.Group(); this.mechGrp.visible = false;
    const lM=new THREE.MeshStandardMaterial({color:c1,roughness:.4,metalness:.6});
    for(let s=-1;s<=1;s+=2){
      const lg=new THREE.Group();lg.position.set(s*.75,0,0);
      const ul=new THREE.Mesh(new THREE.BoxGeometry(.45,1,.45),lM);ul.position.set(0,-.5,0);lg.add(ul);
      const ll=new THREE.Mesh(new THREE.BoxGeometry(.35,1,.35),lM);ll.position.set(0,-1.5,0);lg.add(ll);
      const ft=new THREE.Mesh(new THREE.BoxGeometry(.55,.18,.7),lM);ft.position.set(0,-2.1,.1);lg.add(ft);
      this.mechGrp.add(lg);
    }
    const aM=new THREE.MeshStandardMaterial({color:c2,emissive:c2,emissiveIntensity:.2});
    for(let s=-1;s<=1;s+=2){const arm=new THREE.Mesh(new THREE.BoxGeometry(.35,1.3,.35),aM);arm.position.set(s*1.4,.1,0);this.mechGrp.add(arm);}
    this.group.add(this.mechGrp);
  }

  getForward() {
    return new THREE.Vector3(Math.sin(this.yaw), 0, Math.cos(this.yaw));
  }

  setMode(m) {
    if (m === this.mode && this.modeT <= 0) return;
    if (this.modeT > 0) return;
    this.targetMode = m; this.modeT = 0.5;
    if (this.isPlayer && audioCtx) playTransformSound();
  }

  update(dt) {
    // Mode transition
    if (this.modeT > 0) { this.modeT -= dt; if (this.modeT <= 0) { this.modeT = 0; this.mode = this.targetMode; } }

    // Update visuals
    const t = this.modeT > 0 ? this.modeT / 0.5 : 0;
    this.flyGrp.visible = (this.targetMode === 'fly' || this.mode === 'fly');
    this.mechGrp.visible = (this.targetMode === 'mech' || this.mode === 'mech');
    if (this.flyGrp.visible) this.flyGrp.scale.setScalar(this.mode === 'fly' ? 1 : 1-t);
    if (this.mechGrp.visible) this.mechGrp.scale.setScalar(this.mode === 'mech' ? 1 : 1-t);
    this.wheels.forEach(w => { w.visible = this.mode === 'car'; w.rotation.x += this.speed * .1 * dt * 60; });
  }

  syncMesh() {
    this.group.position.copy(this.pos);
    if (this.mode === 'mech') this.group.position.y += 1.2;
    this.group.rotation.set(0, this.yaw, 0);
  }

  updateProgress() {
    let minD = Infinity, best = 0;
    for (let i = 0; i < trackWPs.length; i++) {
      const d = this.pos.distanceToSquared(trackWPs[i]);
      if (d < minD) { minD = d; best = i; }
    }
    this.wpIdx = best;
    this.totalProgress = (this.lap - 1) * trackWPs.length + best;

    // Checkpoints
    const cpIndices = [0, 100, 200, 300];
    for (let ci = 0; ci < cpIndices.length; ci++) {
      const cpIdx = cpIndices[ci];
      if (cpIdx >= trackWPs.length) continue;
      const cp = trackWPs[cpIdx];
      if (this.pos.distanceTo(cp) < 12) {
        if (ci === this.nextCP) {
          this.cpPassed.add(ci);
          this.nextCP = (ci + 1) % cpIndices.length;
          if (ci === 0 && this.cpPassed.size >= cpIndices.length) {
            this.lap++;
            this.cpPassed.clear();
            if (this.lap > LAPS && !this.finished) {
              this.finished = true;
              this.finishTime = raceTimer;
            }
          }
          if (this.isPlayer && audioCtx) playCheckpointSound();
        }
      }
    }
  }

  reset(idx) {
    this.wpIdx = idx;
    if (trackWPs.length > 0) {
      const wp = trackWPs[idx % trackWPs.length];
      const nw = trackWPs[(idx + 1) % trackWPs.length];
      this.pos.copy(wp).add(new THREE.Vector3(0, 1, 0));
      this.yaw = Math.atan2(nw.x - wp.x, nw.z - wp.z);
    }
    this.vel.set(0,0,0); this.yVel = 0; this.speed = 0;
    this.lap = 1; this.nextCP = 0; this.cpPassed.clear();
    this.finished = false; this.finishTime = 0;
    this.boost = 100; this.mode = 'car'; this.targetMode = 'car'; this.modeT = 0;
    this.totalProgress = 0;
    this.aiTarget = (idx + 20) % (trackWPs.length || 1);
    this.syncMesh();
  }
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
async function init() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0a0a12, 0.003);

  camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.5, 600);

  renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.insertBefore(renderer.domElement, document.body.firstChild);

  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.55, 0.35, 0.75));
  composer.addPass(new SMAAPass(innerWidth, innerHeight));

  // Lights
  scene.add(new THREE.AmbientLight(0x445566, 0.7));
  const sun = new THREE.DirectionalLight(0xffeedd, 1.0);
  sun.position.set(60, 100, 40);
  sun.castShadow = true; sun.shadow.mapSize.set(2048, 2048);
  const sc = sun.shadow.camera; sc.left=sc.bottom=-150; sc.right=sc.top=150; sc.far=300;
  scene.add(sun);
  scene.add(new THREE.HemisphereLight(0x4466aa, 0x112211, 0.4));

  buildTrack();
  buildEnvironment();

  player = new Vehicle(0x4af0c0, 0xff8c42, true, 0);
  for (let i = 0; i < NUM_AI; i++) {
    aiVehicles.push(new Vehicle(AI_COLORS[i], 0xcccccc, false, (i + 1) * 5));
  }

  clock = new THREE.Clock();
  setupInput();
  window.addEventListener('resize', onResize);
  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════
// TRACK
// ═══════════════════════════════════════
function buildTrack() {
  const cps = [
    [0,0,0],[40,0,-25],[80,0,-65],[100,3,-110],
    [80,6,-145],[40,7,-165],[0,5,-155],[-35,2,-135],
    [-75,0,-105],[-95,0,-65],[-85,0,-25],
    [-65,2,10],[-45,6,30],[-25,1,40],[0,0,30],[20,0,12]
  ].map(p=>new THREE.Vector3(...p));

  const curve = new THREE.CatmullRomCurve3(cps, true, 'catmullrom', 0.5);
  const N = 400;
  const pts = curve.getSpacedPoints(N);
  const tans = pts.map((_,i) => curve.getTangentAt(i/N));
  trackWPs = pts.map(p => p.clone());

  // Track mesh
  const verts=[], idxs=[], norms=[], uvs=[];
  for(let i=0;i<pts.length;i++){
    const p=pts[i], t=tans[i];
    const right=new THREE.Vector3().crossVectors(t,UP).normalize();
    const n=new THREE.Vector3().crossVectors(right,t).normalize();
    for(let s=-1;s<=1;s+=2){
      verts.push(p.x+right.x*TRACK_HW*s, p.y, p.z+right.z*TRACK_HW*s);
      norms.push(n.x,n.y,n.z); uvs.push(s===-1?0:1, i/pts.length*30);
    }
    if(i<pts.length-1){const b=i*2;idxs.push(b,b+1,b+2,b+1,b+3,b+2);}
  }
  const last=(pts.length-1)*2; idxs.push(last,last+1,0,last+1,1,0);
  const tGeo=new THREE.BufferGeometry();
  tGeo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  tGeo.setAttribute('normal',new THREE.Float32BufferAttribute(norms,3));
  tGeo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  tGeo.setIndex(idxs);
  const tMesh=new THREE.Mesh(tGeo,new THREE.MeshStandardMaterial({color:0x1e1e2a,roughness:.6,metalness:.2}));
  tMesh.receiveShadow=true; scene.add(tMesh);

  // Neon edge tubes
  for(let side=-1;side<=1;side+=2){
    const ep=[];
    for(let i=0;i<pts.length;i+=2){
      const p=pts[i],t=tans[i],r=new THREE.Vector3().crossVectors(t,UP).normalize();
      ep.push(new THREE.Vector3(p.x+r.x*(TRACK_HW+.3)*side, p.y+.15, p.z+r.z*(TRACK_HW+.3)*side));
    }
    const tc=new THREE.CatmullRomCurve3(ep,true);
    const col=side===-1?0x4af0c0:0xff8c42;
    scene.add(new THREE.Mesh(
      new THREE.TubeGeometry(tc,ep.length,0.12,4,true),
      new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:2.5,roughness:.2,metalness:.8})
    ));
  }

  // Checkpoints (visual)
  [0,100,200,300].forEach((idx,i)=>{
    if(idx>=pts.length)return;
    const p=pts[idx],nt=pts[(idx+1)%pts.length];
    const a=Math.atan2(nt.x-p.x,nt.z-p.z);
    const g=new THREE.Group();g.position.copy(p);g.rotation.y=a;
    const pm=new THREE.MeshStandardMaterial({color:0x4af0c0,emissive:0x4af0c0,emissiveIntensity:1.5});
    for(let s=-1;s<=1;s+=2){const pil=new THREE.Mesh(new THREE.BoxGeometry(.4,5,.4),pm);pil.position.set(s*TRACK_HW,2.5,0);g.add(pil);}
    const bm=i===0?new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:2}):pm;
    const beam=new THREE.Mesh(new THREE.BoxGeometry(TRACK_W,.25,.25),bm);beam.position.set(0,5,0);g.add(beam);
    scene.add(g);
  });

  // Barriers
  const bG=new THREE.BoxGeometry(1,1.2,2);
  const bM1=new THREE.MeshStandardMaterial({color:0x222233});
  const bM2=new THREE.MeshStandardMaterial({color:0xff8c42,emissive:0xff8c42,emissiveIntensity:.3});
  for(let i=0;i<pts.length;i+=10){
    const p=pts[i],t=tans[i],r=new THREE.Vector3().crossVectors(t,UP).normalize();
    const a=Math.atan2(t.x,t.z);
    for(let s=-1;s<=1;s+=2){
      const m=new THREE.Mesh(bG,i%20===0?bM2:bM1);
      m.position.set(p.x+r.x*(TRACK_HW+1)*s,p.y+.6,p.z+r.z*(TRACK_HW+1)*s);
      m.rotation.y=a;m.castShadow=true;scene.add(m);
    }
  }
}

// ═══════════════════════════════════════
// ENVIRONMENT
// ═══════════════════════════════════════
function buildEnvironment() {
  const gnd=new THREE.Mesh(new THREE.PlaneGeometry(600,600),new THREE.MeshStandardMaterial({color:0x0a0a14,roughness:.9}));
  gnd.rotation.x=-Math.PI/2;gnd.position.y=-.5;gnd.receiveShadow=true;scene.add(gnd);

  const bC=[0x0a0a18,0x0c0c20,0x101028,0x080816];
  const nC=[0x4af0c0,0xff8c42,0xff4466,0x3388ff,0xaa44ff];
  for(let i=0;i<70;i++){
    let bx,bz;
    do{bx=(Math.random()-.5)*500;bz=(Math.random()-.5)*500;}while(nearTrack(bx,bz,28));
    const w=6+Math.random()*14,h=12+Math.random()*55,d=6+Math.random()*14;
    const b=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshStandardMaterial({color:bC[i%4],roughness:.8,metalness:.3}));
    b.position.set(bx,h/2,bz);b.castShadow=true;scene.add(b);
    if(Math.random()>.35){
      const nc=nC[Math.floor(Math.random()*nC.length)];
      const ns=new THREE.Mesh(new THREE.BoxGeometry(w+.2,.25,.25),new THREE.MeshStandardMaterial({color:nc,emissive:nc,emissiveIntensity:3}));
      ns.position.set(bx,h*(.3+Math.random()*.5),bz+d/2+.13);scene.add(ns);
    }
  }
  // Track lights
  for(let i=0;i<trackWPs.length;i+=25){
    const w=trackWPs[i];
    const pl=new THREE.PointLight(i%50===0?0x4af0c0:0xff8c42,12,28);pl.position.set(w.x,w.y+4.5,w.z);scene.add(pl);
  }
}

function nearTrack(x,z,d){
  for(let i=0;i<trackWPs.length;i+=4){const w=trackWPs[i];if((x-w.x)**2+(z-w.z)**2<d*d)return true;}return false;
}

// ═══════════════════════════════════════
// ARCADE PHYSICS - no Rapier needed
// ═══════════════════════════════════════
function getTrackHeightAt(x, z) {
  let minD = Infinity, bestI = 0;
  for (let i = 0; i < trackWPs.length; i++) {
    const w = trackWPs[i];
    const d = (x-w.x)**2 + (z-w.z)**2;
    if (d < minD) { minD = d; bestI = i; }
  }
  if (minD < (TRACK_HW + 5) ** 2) {
    // Smooth interpolation between nearest waypoints
    const p1 = trackWPs[bestI];
    const p2 = trackWPs[(bestI + 1) % trackWPs.length];
    const p0 = trackWPs[(bestI - 1 + trackWPs.length) % trackWPs.length];
    // Weighted average of neighboring heights
    const d0 = Math.sqrt((x-p0.x)**2 + (z-p0.z)**2);
    const d1 = Math.sqrt(minD);
    const d2 = Math.sqrt((x-p2.x)**2 + (z-p2.z)**2);
    const w0 = 1/(d0+0.1), w1 = 1/(d1+0.1), w2 = 1/(d2+0.1);
    const total = w0+w1+w2;
    return (p0.y*w0 + p1.y*w1 + p2.y*w2) / total;
  }
  return -0.5;
}

function updatePlayerArcade(dt) {
  if (gameState !== 'racing') return;

  const isW = keys['KeyW'] || keys['ArrowUp'];
  const isS = keys['KeyS'] || keys['ArrowDown'];
  const isA = keys['KeyA'] || keys['ArrowLeft'];
  const isD = keys['KeyD'] || keys['ArrowRight'];
  const isBst = keys['ShiftLeft'] || keys['ShiftRight'];
  const isJmp = keys['Space'];

  const params = {
    car: { maxSpd: 45, accel: 50, decel: 20, turn: 2.8 },
    fly: { maxSpd: 35, accel: 35, decel: 10, turn: 2.0 },
    mech: { maxSpd: 18, accel: 25, decel: 15, turn: 1.8 },
  };
  const mp = params[player.mode];

  // Turning
  if (player.speed > 0.5) {
    const turnFactor = Math.min(1, player.speed / 10);
    if (isA) player.yaw += mp.turn * dt * turnFactor;
    if (isD) player.yaw -= mp.turn * dt * turnFactor;
  }

  // Acceleration
  const fwd = player.getForward();
  if (isW) {
    player.speed = Math.min(mp.maxSpd, player.speed + mp.accel * dt);
  } else if (isS) {
    player.speed = Math.max(-mp.maxSpd * 0.3, player.speed - mp.accel * 0.8 * dt);
  } else {
    // Natural deceleration
    if (player.speed > 0) player.speed = Math.max(0, player.speed - mp.decel * dt);
    else if (player.speed < 0) player.speed = Math.min(0, player.speed + mp.decel * dt);
  }

  // Boost
  if (isBst && player.boost > 0 && player.speed > 2) {
    player.speed = Math.min(mp.maxSpd * 1.4, player.speed + 30 * dt);
    player.boost = Math.max(0, player.boost - 30 * dt);
    player.boostActive = true;
    // Drift when turning
    if (isA || isD) player.yaw += (isA ? 1 : -1) * 1.5 * dt;
  } else {
    player.boost = Math.min(100, player.boost + 8 * dt);
    player.boostActive = false;
  }

  // Move
  const moveDir = player.getForward();
  player.pos.x += moveDir.x * player.speed * dt;
  player.pos.z += moveDir.z * player.speed * dt;

  // Vertical physics
  const groundY = getTrackHeightAt(player.pos.x, player.pos.z) + 0.5;

  if (player.mode === 'fly') {
    // Fly: hover above ground
    const targetY = groundY + 5;
    if (isJmp) player.yVel += 15 * dt;
    player.yVel -= 5 * dt; // gentle gravity
    player.pos.y += player.yVel * dt;
    if (player.pos.y < groundY) { player.pos.y = groundY; player.yVel = 0; player.grounded = true; }
    else player.grounded = false;
  } else if (player.mode === 'mech') {
    // Mech: can jump high
    player.yVel -= 30 * dt; // gravity
    player.pos.y += player.yVel * dt;
    if (player.pos.y <= groundY) {
      player.pos.y = groundY; player.yVel = 0; player.grounded = true;
      if (isJmp) player.yVel = 12; // jump!
    } else player.grounded = false;
  } else {
    // Car: stick to ground
    player.yVel -= 30 * dt;
    player.pos.y += player.yVel * dt;
    if (player.pos.y <= groundY) { player.pos.y = groundY; player.yVel = 0; player.grounded = true; }
    else player.grounded = false;
    if (isJmp && player.grounded) player.yVel = 6; // small hop
  }

  // Track boundary enforcement
  {
    let minD = Infinity, bestI = 0;
    for (let i = 0; i < trackWPs.length; i++) {
      const w = trackWPs[i];
      const d = (player.pos.x - w.x) ** 2 + (player.pos.z - w.z) ** 2;
      if (d < minD) { minD = d; bestI = i; }
    }
    const distFromTrack = Math.sqrt(minD);
    if (distFromTrack > TRACK_HW + 2) {
      const wp = trackWPs[bestI];
      const pushX = wp.x - player.pos.x;
      const pushZ = wp.z - player.pos.z;
      const pushLen = Math.sqrt(pushX * pushX + pushZ * pushZ);
      if (pushLen > 0) {
        const strength = Math.min(1, (distFromTrack - TRACK_HW) / 4) * 3;
        player.pos.x += (pushX / pushLen) * strength;
        player.pos.z += (pushZ / pushLen) * strength;
      }
      if (distFromTrack > TRACK_HW + 10) player.speed *= 0.9;
    }
  }

  // Respawn if fallen
  if (player.pos.y < -10) {
    const wp = trackWPs[player.wpIdx];
    player.pos.copy(wp).add(new THREE.Vector3(0, 3, 0));
    player.speed = 0; player.yVel = 0;
  }

  player.update(dt);
  player.syncMesh();
  player.updateProgress();
  updateEngineSound(player.speed);
}

function updateAIArcade(dt) {
  if (gameState !== 'racing') return;

  aiVehicles.forEach(ai => {
    const tgt = trackWPs[ai.aiTarget % trackWPs.length];
    const dx = tgt.x - ai.pos.x, dz = tgt.z - ai.pos.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    if (dist < 12) ai.aiTarget = (ai.aiTarget + 5) % trackWPs.length;

    // Rubber band
    let sm = 1.0;
    const diff = ai.totalProgress - player.totalProgress;
    if (diff > 40) sm = 0.6;
    else if (diff < -40) sm = 1.5;

    // Steer toward target
    const targetYaw = Math.atan2(dx, dz);
    let yd = targetYaw - ai.yaw;
    while (yd > Math.PI) yd -= Math.PI * 2;
    while (yd < -Math.PI) yd += Math.PI * 2;
    ai.yaw += yd * 3.0 * dt;

    // Speed
    const targetSpd = ai.aiBaseSpeed * sm;
    if (ai.speed < targetSpd) ai.speed = Math.min(targetSpd, ai.speed + 30 * dt);
    else ai.speed = Math.max(targetSpd, ai.speed - 15 * dt);

    // Move
    const fwd = ai.getForward();
    ai.pos.x += fwd.x * ai.speed * dt;
    ai.pos.z += fwd.z * ai.speed * dt;

    // Ground tracking
    const gy = getTrackHeightAt(ai.pos.x, ai.pos.z) + 0.5;
    ai.yVel -= 30 * dt;
    ai.pos.y += ai.yVel * dt;
    if (ai.pos.y <= gy) { ai.pos.y = gy; ai.yVel = 0; }

    // Respawn
    if (ai.pos.y < -10) {
      const wp = trackWPs[ai.wpIdx]; ai.pos.copy(wp).add(new THREE.Vector3(0,3,0));
      ai.speed = 0; ai.yVel = 0;
    }

    // Random mode switch
    if (Math.random() < 0.001) ai.setMode(['car','fly','mech'][Math.floor(Math.random()*3)]);

    ai.update(dt);
    ai.syncMesh();
    ai.updateProgress();
  });
}

// ═══════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════
const camTarget = new THREE.Vector3();
const camPos = new THREE.Vector3();

function updateCamera(dt) {
  if (!player) return;
  const d = 16, h = 7;
  // Auto-follow behind vehicle, plus user offset
  const baseAngle = player.yaw + Math.PI; // behind the car
  const angle = baseAngle + camAngleH;
  const idealX = player.pos.x + Math.sin(angle) * d;
  const idealY = player.pos.y + h + camAngleV * 5;
  const idealZ = player.pos.z + Math.cos(angle) * d;
  const lerpF = Math.min(1, 6 * dt);
  camPos.lerp(new THREE.Vector3(idealX, idealY, idealZ), lerpF);
  camera.position.copy(camPos);
  camTarget.lerp(new THREE.Vector3(player.pos.x, player.pos.y + 1.5, player.pos.z), lerpF);
  camera.lookAt(camTarget);
}

// ═══════════════════════════════════════
// INPUT
// ═══════════════════════════════════════
function setupInput() {
  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space' && gameState === 'title') startRace();
    if (e.code === 'Backquote') { debugVisible = !debugVisible; document.getElementById('debug-overlay').style.display = debugVisible ? 'block' : 'none'; }
    if (gameState === 'racing') {
      if (e.code === 'Digit1') player.setMode('car');
      if (e.code === 'Digit2') player.setMode('fly');
      if (e.code === 'Digit3') player.setMode('mech');
    }
    e.preventDefault();
  });
  window.addEventListener('keyup', e => { keys[e.code] = false; });
  renderer.domElement.addEventListener('mousemove', e => {
    if (gameState === 'racing' || (e.buttons & 1)) {
      camAngleH -= e.movementX * 0.003;
      camAngleV = Math.max(-0.3, Math.min(1.0, camAngleV - e.movementY * 0.003));
    }
  });
  const startClick = () => { if (gameState === 'title') startRace(); if (!audioCtx) initAudio(); else if (audioCtx.state === 'suspended') audioCtx.resume(); };
  renderer.domElement.addEventListener('click', startClick);
  document.getElementById('title-screen').addEventListener('click', startClick);
  document.getElementById('btn-race-again').addEventListener('click', restartRace);
  document.getElementById('btn-menu').addEventListener('click', backToMenu);
}

// ═══════════════════════════════════════
// RACE FLOW
// ═══════════════════════════════════════
let countdownVal = 3;
function startRace() {
  if (gameState !== 'title') return;
  document.getElementById('title-screen').style.display = 'none';
  gameState = 'countdown'; countdownVal = 3;
  document.getElementById('countdown').style.display = 'flex';
  document.getElementById('game-hud').style.display = 'block';
  if (!audioCtx) initAudio();
  doCountdown();
}
function doCountdown() {
  if (countdownVal > 0) {
    document.getElementById('countdown').textContent = countdownVal;
    if (audioCtx) playTone(countdownVal > 1 ? 440 : 880, .3, 'sine', .2);
    countdownVal--;
    setTimeout(doCountdown, 1000);
  } else {
    document.getElementById('countdown').textContent = 'GO!';
    if (audioCtx) playTone(1320, .3, 'sine', .2);
    setTimeout(() => { document.getElementById('countdown').style.display = 'none'; gameState = 'racing'; raceTimer = 0; }, 500);
  }
}
function finishRace() {
  gameState = 'finished';
  const all = [player, ...aiVehicles].sort((a,b) => {
    if (a.finished && !b.finished) return -1; if (!a.finished && b.finished) return 1;
    return a.finished && b.finished ? a.finishTime - b.finishTime : b.totalProgress - a.totalProgress;
  });
  const pos = all.indexOf(player) + 1;
  const pn = ['1st','2nd','3rd','4th'][pos-1];
  const m = Math.floor(player.finishTime/60), s = (player.finishTime%60).toFixed(1);
  const xp = Math.max(0, (5-pos)*100);
  document.getElementById('finish-title').textContent = pos===1?'VICTORY!':'RACE COMPLETE!';
  document.getElementById('finish-results').innerHTML =
    `<div>Position: <span style="color:var(--color-primary)">${pn}</span></div>
     <div>Time: <span style="color:var(--color-orange)">${m}:${s.padStart(4,'0')}</span></div>
     <div>Laps: ${Math.min(player.lap,LAPS)} / ${LAPS}</div>
     <div>XP: <span style="color:var(--color-primary)">+${xp}</span></div>`;
  document.getElementById('finish-screen').style.display = 'flex';
}
function restartRace() {
  document.getElementById('finish-screen').style.display = 'none';
  resetAll(); gameState = 'countdown'; countdownVal = 3;
  document.getElementById('countdown').style.display = 'flex'; doCountdown();
}
function backToMenu() {
  document.getElementById('finish-screen').style.display = 'none';
  document.getElementById('game-hud').style.display = 'none';
  document.getElementById('title-screen').style.display = 'flex';
  resetAll(); gameState = 'title';
}
function resetAll() {
  player.reset(0);
  aiVehicles.forEach((a, i) => a.reset((i+1)*5));
  raceTimer = 0;
}

// ═══════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════
function initAudio(){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function playTone(freq,dur,type='square',vol=.15){
  if(!audioCtx)return;try{
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.connect(g).connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);}catch(e){}}
function playCheckpointSound(){playTone(880,.15,'sine',.15);setTimeout(()=>playTone(1320,.1,'sine',.1),80);}
function playTransformSound(){playTone(220,.2,'sawtooth',.08);setTimeout(()=>playTone(440,.15,'square',.06),100);}
function updateEngineSound(spd){
  if(!audioCtx)return;try{
  if(!engineOsc){engineOsc=audioCtx.createOscillator();engineGain=audioCtx.createGain();
  engineOsc.type='sawtooth';engineOsc.frequency.value=55;engineGain.gain.value=.03;
  engineOsc.connect(engineGain).connect(audioCtx.destination);engineOsc.start();}
  engineOsc.frequency.value=55+Math.abs(spd)*2.5;
  engineGain.gain.value=Math.min(.05,.015+Math.abs(spd)*.0008);}catch(e){}}

// ═══════════════════════════════════════
// HUD
// ═══════════════════════════════════════
function updateHUD() {
  if (gameState !== 'racing' && gameState !== 'countdown') return;
  const all = [player, ...aiVehicles].sort((a,b) => b.totalProgress - a.totalProgress);
  const pos = all.indexOf(player) + 1;
  document.getElementById('hud-position').textContent = `${['1st','2nd','3rd','4th'][pos-1]} / ${all.length}`;
  document.getElementById('hud-lap').textContent = `Lap ${Math.min(player.lap, LAPS)} / ${LAPS}`;
  const m = Math.floor(raceTimer/60), s = (raceTimer%60).toFixed(1);
  document.getElementById('hud-timer').textContent = `${m}:${s.padStart(4,'0')}`;
  document.getElementById('hud-speed').textContent = Math.floor(Math.abs(player.speed) * 3.6);
  const me = document.getElementById('hud-mode');
  me.textContent = player.mode.toUpperCase();
  me.className = `mode-indicator mode-${player.mode}`;
  document.getElementById('hud-boost').style.width = `${player.boost}%`;
  drawMinimap();
}

function drawMinimap() {
  const cv = document.getElementById('minimap-canvas');
  const ctx = cv.getContext('2d');
  ctx.clearRect(0,0,140,140);
  let mnX=1e9,mxX=-1e9,mnZ=1e9,mxZ=-1e9;
  trackWPs.forEach(w=>{mnX=Math.min(mnX,w.x);mxX=Math.max(mxX,w.x);mnZ=Math.min(mnZ,w.z);mxZ=Math.max(mxZ,w.z);});
  const rng=Math.max(mxX-mnX,mxZ-mnZ)+30,sc=120/rng;
  const ox=70-(mnX+mxX)/2*sc,oz=70-(mnZ+mxZ)/2*sc;
  ctx.strokeStyle='#444';ctx.lineWidth=2.5;ctx.beginPath();
  trackWPs.forEach((w,i)=>{const x=w.x*sc+ox,z=w.z*sc+oz;i===0?ctx.moveTo(x,z):ctx.lineTo(x,z);});
  ctx.closePath();ctx.stroke();
  aiVehicles.forEach((a,i)=>{ctx.fillStyle=['#ff3344','#3388ff','#ffcc22'][i];ctx.beginPath();ctx.arc(a.pos.x*sc+ox,a.pos.z*sc+oz,3,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle='#4af0c0';ctx.beginPath();ctx.arc(player.pos.x*sc+ox,player.pos.z*sc+oz,4,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();
}

// DEBUG
// ═══════════════════════════════════════
let dbgF=0,dbgT=performance.now();
function updateDebug(){
  if(!debugVisible)return;dbgF++;const now=performance.now();
  if(now-dbgT>=1000){
    const fps=dbgF*1000/(now-dbgT);const info=renderer.info;
    document.getElementById('debug-overlay').textContent=[
      `FPS: ${fps.toFixed(0)}`,
      `Draw: ${info.render.calls} Tri: ${info.render.triangles}`,
      `Geo: ${info.memory.geometries} Tex: ${info.memory.textures}`,
      `Mode: ${player?.mode} Spd: ${player?.speed?.toFixed(1)}`,
      performance.memory?`Heap: ${(performance.memory.usedJSHeapSize/1048576).toFixed(1)}MB`:'',
    ].filter(Boolean).join('\n');dbgF=0;dbgT=now;
  }
}

// ═══════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════
const FDT = 1/60;
let acc = 0;
function gameLoop() {
  requestAnimationFrame(gameLoop);
  const delta = Math.min(clock.getDelta(), 0.1);

  if (gameState === 'racing') {
    raceTimer += delta;
    acc += delta;
    while (acc >= FDT) {
      updatePlayerArcade(FDT);
      updateAIArcade(FDT);
      acc -= FDT;
    }
    if (player.finished) finishRace();
  }

  updateCamera(delta);
  updateHUD();
  renderer.info.reset();
  composer.render();
  updateDebug();
}

function onResize(){
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);
}

  state: gameState, raceTimer: raceTimer?.toFixed(1),

  ai: aiVehicles.map(a => ({x:a.pos.x?.toFixed(1), z:a.pos.z?.toFixed(1), speed:a.speed?.toFixed(1)})),
});

window.advanceTime = (ms) => {
  const steps = Math.max(1, Math.round(ms/(1000/60)));
  for (let i=0; i<steps; i++) {
    updatePlayerArcade(FDT); updateAIArcade(FDT); raceTimer += FDT;
  }
  updateCamera(FDT); updateHUD();
  renderer.info.reset(); composer.render();
};

init().catch(e => console.error('Init error:', e));
</script>
</body>
</html>
